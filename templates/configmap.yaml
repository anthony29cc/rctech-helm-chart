# ConfigMap que genera una página HTML personalizada, inyectada como
# volumen en el contenedor Nginx. Cambiar app.name / app.color en
# values.yaml y hacer "helm upgrade" (o dejar que Argo CD lo sincronice)
# actualiza esta página automáticamente.
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "rctech-web.fullname" . }}-html
  labels:
    {{- include "rctech-web.labels" . | nindent 4 }}
data:
  index.html: |
    <!doctype html>
    <html lang="es">
    <head>
      <meta charset="utf-8">
      <title>{{ .Values.app.name }}</title>
      <style>
        body{margin:0;height:100vh;display:grid;place-items:center;
             font-family:system-ui,sans-serif;background:{{ .Values.app.color }};color:#fff}
        h1{font-size:2.5rem}
        code{background:rgba(0,0,0,.25);padding:.2em .5em;border-radius:6px}
      </style>
    </head>
    <body>
      <div style="text-align:center">
        <h1>{{ .Values.app.name }}</h1>
        <p>Desplegado vía Helm + Argo CD (GitOps)</p>
        <p>Imagen: <code>{{ .Values.image.repository }}:{{ .Values.image.tag }}</code></p>
        <p>Réplicas: <code>{{ .Values.replicaCount }}</code></p>
      </div>
    </body>
    </html>
