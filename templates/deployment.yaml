apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "rctech-web.fullname" . }}
  labels:
    {{- include "rctech-web.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "rctech-web.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rctech-web.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          volumeMounts:
            - name: html
              mountPath: /usr/share/nginx/html
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: html
          configMap:
            name: {{ include "rctech-web.fullname" . }}-html
